name: Level 2 - Koopa's Fortress

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Dit is een workflow dispatch'
        required: false
        default: 'Hallo!'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      # 2. Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. Verify Java version
      - name: Check Java version
        run: java -version

      # 4. Set up Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 5. Build project
      - name: Build with Gradle
        run: ./gradlew clean test

      # 6. Export test results
      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: "build/reports/tests/test/index.html"
        if: always()


