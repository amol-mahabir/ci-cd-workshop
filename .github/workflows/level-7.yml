#############################################
# Level 7 — Star Road (STUB)
#
# Doel (verhaal):
#  Navigeer Star Road: een echte productie‑achtige pipeline is groot en lastig te lezen.
#
# Daadwerkelijk leerdoel:
# - Alle stappen uit eerdere levels combineren in één (te) grote workflow
# - Oefening: refactor naar leesbare, herbruikbare delen (jobs, composite actions, reusable workflows)
# - Pas best‑practices toe: duidelijke job/step namen, conditionals, permissions, artifacts, caching
#
# Instructie:
# - Deze stub is bewust log en bulky: 1 job met veel stappen
# - Jouw opdracht: splits op in logische jobs en/of herbruikbare componenten
# - Houd functionaliteit gelijkwaardig aan deze monolitische variant
#############################################
name: Level 7 - Star Road

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  everything-everywhere:
    runs-on: ubuntu-latest
    # Least privilege: workflow heeft alleen contents:read; dit job voegt packages:write toe
    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
      LATEST: ghcr.io/${{ github.repository }}:latest
      JACOCO_XML: build/reports/jacoco/test/jacocoTestReport.xml

    steps:
      - name: Check out code (Mario springt in de pijp)
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Gradle wrapper (sneller opstarten)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

      - name: Cache Gradle caches (dependency cache)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/daemon
            ~/.gradle/native
            ~/.gradle/notifications
          key: ${{ runner.os }}-gradle-caches-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties', '**/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-caches-

      - name: Setup Gradle (Toad levert gereedschap)
        uses: gradle/actions/setup-gradle@v4

      - name: Build (Level 1)
        run: ./gradlew build --scan --no-daemon

      - name: Run tests (Level 2)
        run: ./gradlew test --stacktrace --no-daemon

      - name: Upload test reports (altijd)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/test-results/test
            build/reports/tests/test

      - name: Run tests + generate JaCoCo report (Level 3)
        env:
          JACOCO_MINIMUM_COVERAGE: "0.60"
        run: ./gradlew test jacocoTestReport

      - name: Upload coverage reports (altijd)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            build/reports/jacoco/test/jacocoTestReport.xml
            build/reports/jacoco/test/html

      - name: Build artifact (Level 4)
        run: ./gradlew build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

      - name: Login to GHCR (alleen op main) (Level 5)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker context (copy JAR)
        run: |
          set -euo pipefail
          JAR_FILE=$(ls -1 build/libs/*.jar 2>/dev/null | grep -v "-plain\.jar$" | head -n1 || true)
          if [ -z "${JAR_FILE}" ]; then
            echo "[ERROR] No JAR found in downloaded artifact. Contents:";
            ls -R docker || true; exit 1; fi
          echo "Using JAR: ${JAR_FILE}"
          # Normalize path/name so Dockerfile can COPY it without build args
          cp -f "${JAR_FILE}" docker/app.jar

      - name: Build container image (Docker)
        run: |
          docker build \
            -t ${IMAGE} \
            -f docker/Dockerfile \
            docker

      - name: Push image (alleen op main)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${IMAGE}
          # (optioneel) publiceer ook latest tag
          docker tag ${IMAGE} ${LATEST}
          docker push ${LATEST}
